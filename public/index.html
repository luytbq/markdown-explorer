<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>markdown-explorer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📖</text></svg>" />
    <script>
      // Before first paint, so a dark theme or a closed pane does not flash open.
      try {
        const theme = localStorage.getItem('mdx:theme');
        if (theme) document.documentElement.dataset.theme = theme;

        const panes = JSON.parse(localStorage.getItem('mdx:panes') ?? '{}');
        if (panes.left === 'closed') document.documentElement.dataset.left = 'closed';
        if (panes.right === 'closed') document.documentElement.dataset.right = 'closed';
      } catch {}
    </script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <nav id="explorer" aria-label="Files">
        <div class="pane-head">
          <span class="pane-title">Explorer</span>
          <div class="pane-actions">
            <button id="theme" type="button" title="Toggle theme" aria-label="Toggle theme">◑</button>
            <button
              id="toggle-left"
              class="pane-toggle"
              type="button"
              title="Collapse the explorer  ["
              aria-label="Collapse the explorer"
              aria-expanded="true"
              aria-controls="tree"
            ></button>
          </div>
        </div>
        <!--
          Outside #tree on purpose. renderTree replaces the whole of #tree, and
          the tree is polled every ten seconds, so an input in there would lose
          the caret out from under whoever was typing into it.
        -->
        <div id="search-row">
          <input
            id="search"
            type="search"
            placeholder="Filter files"
            aria-label="Filter files"
            aria-controls="tree"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
        </div>

        <div id="tree"></div>
      </nav>

      <!--
        The mode bar sits outside #content, not sticky inside it. #content is the
        scroll container scrollspy measures against, and a bar inside it would
        move the geometry the outline highlight is calibrated to.
      -->
      <div id="main">
        <!--
          Pinned files. Outside #content for the same reason as the mode bar, and
          hidden entirely (not emptied) while nothing is pinned, so an unpinned
          session pays no height for it.
        -->
        <div id="tabbar" hidden></div>

        <div id="modebar">
          <span id="doc-path"></span>
          <div class="mode-actions">
            <span id="save-status" role="status"></span>
            <span id="dirty" hidden title="Unsaved changes">●</span>
            <div class="modes" role="group" aria-label="Mode">
              <button id="mode-view" type="button" aria-pressed="true">View</button>
              <button id="mode-edit" type="button" aria-pressed="false">Edit</button>
            </div>
            <button id="save" type="button" hidden disabled title="Save  Ctrl+S">Save</button>
          </div>
        </div>

        <div id="banner" role="alert" hidden></div>

        <main id="content">
          <article id="doc" class="markdown-body"></article>
        </main>

        <textarea
          id="editor"
          hidden
          spellcheck="false"
          autocapitalize="off"
          autocomplete="off"
          aria-label="Markdown source"
        ></textarea>
      </div>

      <aside id="outline" aria-label="Outline">
        <div class="pane-head">
          <button
            id="toggle-right"
            class="pane-toggle"
            type="button"
            title="Collapse the outline  ]"
            aria-label="Collapse the outline"
            aria-expanded="true"
            aria-controls="toc"
          ></button>
          <span class="pane-title">Outline</span>
        </div>
        <nav id="toc"></nav>
      </aside>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
